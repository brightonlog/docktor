<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 객체 감지 - Jetson Orin Nano</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .video-section {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: auto;
            display: block;
        }

        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-title {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-unit {
            font-size: 0.6em;
            color: #999;
            margin-left: 5px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4caf50;
            animation: pulse 2s infinite;
            margin-right: 8px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .info-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .info-item {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }

        .info-label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }

        .info-value {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .last-update {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 실시간 객체 감지</h1>
            <p class="subtitle">
                <span class="status-indicator"></span>
                Jetson Orin Nano + YOLOv24
            </p>
        </header>

        <div class="main-content">
            <div class="video-section">
                <h2 style="margin-bottom: 15px; color: #333;">실시간 스트리밍</h2>
                <div class="video-container">
                    <img id="video" src="/video_feed" alt="Video Stream">
                </div>
            </div>

            <div class="stats-section">
                <div class="stat-card">
                    <div class="stat-title">FPS (프레임)</div>
                    <div class="stat-value">
                        <span id="fps">0</span>
                        <span class="stat-unit">fps</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-title">추론 시간</div>
                    <div class="stat-value">
                        <span id="inference">0</span>
                        <span class="stat-unit">ms</span>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-title">감지된 객체</div>
                    <div class="stat-value">
                        <span id="detections">0</span>
                        <span class="stat-unit">개</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="info-section">
            <h2 style="margin-bottom: 15px; color: #333;">시스템 정보</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">모델</div>
                    <div class="info-value">YOLOv11</div>
                </div>
                <div class="info-item">
                    <div class="info-label">해상도</div>
                    <div class="info-value">640x480</div>
                </div>
                <div class="info-item">
                    <div class="info-label">신뢰도</div>
                    <div class="info-value">50%</div>
                </div>
                <div class="info-item">
                    <div class="info-label">플랫폼</div>
                    <div class="info-value">Jetson Orin</div>
                </div>
            </div>
        </div>

        <div class="last-update">
            마지막 업데이트: <span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        // 통계 업데이트
        function updateStats() {
            fetch('/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('fps').textContent = data.fps;
                    document.getElementById('inference').textContent = data.inference_time;
                    document.getElementById('detections').textContent = data.detections;

                    const updateTime = new Date(data.last_update).toLocaleTimeString('ko-KR');
                    document.getElementById('lastUpdate').textContent = updateTime;
                })
                .catch(error => console.error('Error:', error));
        }

        // 1초마다 업데이트
        setInterval(updateStats, 1000);
        updateStats();
    </script>
</body>
</html>
